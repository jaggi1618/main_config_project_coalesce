    sourceMapping:
      - aliases:
          ACCS: ACCS
          ATC: ATC
          BPC: BPC
          C: C
          L: L
          NC: NC
          NC1: NC1
          PD: PD
        customSQL:
          customSQL: ''
        dependencies:
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_TRANSACTION_CLAIM
          - locationName: ALLIANT_CLAIMS_ASTRUS_REF
            nodeName: ACA_BODY_PART_CODE
          - locationName: ALLIANT_CLAIMS_ASTRUS_REF
            nodeName: ACA_ACCIDENT_TYPE_CODE
          - locationName: ALLIANT_CLAIMS_ASTRUS_REF
            nodeName: ACA_NATURE_CODE
          - locationName: ALLIANT_CLAIMS_ASTRUS_REF
            nodeName: ACA_ACCIDENT_SOURCE_CODE
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_SOURCE_SYSTEM
          - locationName: ALLIANT_CLAIMS_ASTRUS_STAGING
            nodeName: PYRAMID_MAX_LEVEL
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_PYRAMID
        join:
          joinCondition: 'FROM {{ ref(''ALLIANT_CLAIMS_ASTRUS_DBO'', ''ACA_TRANSACTION_CLAIM'')
            }} AS C

            LEFT JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_REF'', ''ACA_BODY_PART_CODE'')
            }} AS BPC ON C.PART_OF_BODY_CODE = BPC.PART_OF_BODY_CODE

            LEFT JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_REF'', ''ACA_ACCIDENT_TYPE_CODE'')
            }} AS ATC ON C.ACCIDENT_TYPE_CODE = ATC.TYPE_CODE

            LEFT JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_REF'', ''ACA_NATURE_CODE'') }}
            AS NC ON C.NATURE_OF_LOSS_CODE_BODILY_INJURY = NC.NATURE_CODE

            LEFT JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_REF'', ''ACA_NATURE_CODE'') }}
            AS NC1 ON C.NATURE_OF_LOSS_CODE_PROPERTY_DAMAGE = NC1.NATURE_CODE

            LEFT JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_REF'', ''ACA_ACCIDENT_SOURCE_CODE'')
            }} AS ACCS ON C.ACCIDENT_SOURCE_CODE = ACCS.ACCIDENT_SOURCE_CODE AND ACCS.ACA_SOURCE_SYSTEM_ID
            = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref(''ALLIANT_CLAIMS_ASTRUS_DBO'',
            ''ACA_SOURCE_SYSTEM'') }} WHERE SOURCE_SYSTEM = ''GB'')

            LEFT JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_STAGING'', ''PYRAMID_MAX_LEVEL'')
            }} AS L ON L.CLIENT = C.CLIENT_NUMBER AND L.UNIT_ID = RTRIM(C.REPORTING_UNIT_NUMBER)

            LEFT JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_DBO'', ''ACA_PYRAMID'') }} AS
            PD ON PD.CLIENT = L.CLIENT AND PD.UNIT_ID = L.UNIT_ID AND PD."LEVEL" =
            L."LEVEL"

            WHERE C.TRANSACTION_DATE <= {{ parameters.TRANSDATE }}'
        name: CTECLAIM
        noLinkRefs: []
