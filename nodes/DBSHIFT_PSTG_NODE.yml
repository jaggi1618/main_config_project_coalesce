  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
      UPDATE DBO.ACA_TRANSACTION_EXPERIENCE_STAGING
      SET
          UNIQUE_CLAIM_ID = CONCAT(CLIENT_NUMBER, '-' , ACCIDENT_NUMBER, '-', CLAIM_COVERAGE_CODE, '-' , CLAIM_SEQUENCE_NUMBER),
          EXPERIENCE_AMOUNT1 = CASE WHEN EXPERIENCE_AMOUNT1 LIKE '%-%' THEN CAST(ABS(EXPERIENCE_AMOUNT1)/100 AS DECIMAL(16, 2)) * -1
              ELSE CAST(ABS(EXPERIENCE_AMOUNT1)/100 AS DECIMAL(16, 2))
              END,
          EXPERIENCE_AMOUNT2 = CASE WHEN EXPERIENCE_AMOUNT2 LIKE '%-%' THEN CAST(ABS(EXPERIENCE_AMOUNT2)/100 AS DECIMAL(16, 2)) * -1
              ELSE CAST(ABS(EXPERIENCE_AMOUNT2)/100 AS DECIMAL(16, 2))
              END,
          EXPERIENCE_AMOUNT3 = CASE WHEN EXPERIENCE_AMOUNT3 LIKE '%-%' THEN CAST(ABS(EXPERIENCE_AMOUNT3)/100 AS DECIMAL(16, 2)) * -1
              ELSE CAST(ABS(EXPERIENCE_AMOUNT3)/100 AS DECIMAL(16, 2))
              END,
          EXPERIENCE_AMOUNT4 = CASE WHEN EXPERIENCE_AMOUNT4 LIKE '%-%' THEN CAST(ABS(EXPERIENCE_AMOUNT4)/100 AS DECIMAL(16, 2)) * -1
              ELSE CAST(ABS(EXPERIENCE_AMOUNT4)/100 AS DECIMAL(16, 2))
              END,
          EXPERIENCE_AMOUNT5 = CASE WHEN EXPERIENCE_AMOUNT5 LIKE '%-%' THEN CAST(ABS(EXPERIENCE_AMOUNT5)/100 AS DECIMAL(16, 2)) * -1
              ELSE CAST(ABS(EXPERIENCE_AMOUNT5)/100 AS DECIMAL(16, 2))
              END,
          EXPERIENCE_AMOUNT6 = CASE WHEN EXPERIENCE_AMOUNT6 LIKE '%-%' THEN CAST(ABS(EXPERIENCE_AMOUNT6)/100 AS DECIMAL(16, 2)) * -1
              ELSE CAST(ABS(EXPERIENCE_AMOUNT6)/100 AS DECIMAL(16, 2))
              END,
          TOTAL_EXPERIENCE_AMOUNT_ALL_RESERVE_TYPES = CASE WHEN TOTAL_EXPERIENCE_AMOUNT_ALL_RESERVE_TYPES LIKE '%-%' THEN CAST(ABS(TOTAL_EXPERIENCE_AMOUNT_ALL_RESERVE_TYPES)/100 AS DECIMAL(16, 2)) * -1
              ELSE CAST(ABS(TOTAL_EXPERIENCE_AMOUNT_ALL_RESERVE_TYPES)/100 AS DECIMAL(16, 2))
              END,
          EXPERIENCE_CHANGE_AMOUNT1 = CAST(ABS(EXPERIENCE_CHANGE_AMOUNT1)/100 AS DECIMAL(16, 2)),
          EXPERIENCE_CHANGE_AMOUNT2 = CAST(ABS(EXPERIENCE_CHANGE_AMOUNT2)/100 AS DECIMAL(16, 2)),
          EXPERIENCE_CHANGE_AMOUNT3 = CAST(ABS(EXPERIENCE_CHANGE_AMOUNT3)/100 AS DECIMAL(16, 2)),
          EXPERIENCE_CHANGE_AMOUNT4 = CAST(ABS(EXPERIENCE_CHANGE_AMOUNT4)/100 AS DECIMAL(16, 2)),
          EXPERIENCE_CHANGE_AMOUNT5 = CAST(ABS(EXPERIENCE_CHANGE_AMOUNT5)/100 AS DECIMAL(16, 2)),
          EXPERIENCE_CHANGE_AMOUNT6 = CAST(ABS(EXPERIENCE_CHANGE_AMOUNT6)/100 AS DECIMAL(16, 2)),
          TOTAL_EXPERIENCE_CHANGE_AMOUNT_ALL_RESERVE_TYPES = CAST(ABS(TOTAL_EXPERIENCE_CHANGE_AMOUNT_ALL_RESERVE_TYPES)/100 AS DECIMAL(16, 2)),
          EXPERIENCE_TRANSACTION_DATE = DATE_FROM_PARTS(TRANSACTION_YEAR,TRANSACTION_MONTH,TRANSACTION_DAY),
          POLICY_EFFECTIVE_DATE = CASE WHEN POLICY_EFFECTIVE_YEAR = '0000' THEN NULL
                                         ELSE DATE_FROM_PARTS(POLICY_EFFECTIVE_YEAR,POLICY_EFFECTIVE_MONTH,POLICY_EFFECTIVE_DAY)
                                         END,
          POLICY_EXPIRATION_DATE = CASE WHEN POLICY_EXPIRATION_YEAR = '0000' THEN NULL
                                         ELSE DATE_FROM_PARTS(POLICY_EXPIRATION_YEAR,POLICY_EXPIRATION_MONTH,POLICY_EXPIRATION_DAY)
                                         END,
          ACA_DATE_UPDATED  = CURRENT_TIMESTAMP(),
          ACA_UPDATE_USER = 'spaca_aca_transaction_experience_staging_update';
      END;
    testsEnabled: true
    truncateBefore: false
