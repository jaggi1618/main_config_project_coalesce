    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
      UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIMANT_STAGING_ESIS AS C
      SET
          CLAIMANT_ENCRYPTED = ENCRYPT(TO_BINARY(C.CLAIMANT), 'placeholder_symmetric_key', TO_BINARY('123')),
          LAST_NAME_ENCRYPTED = ENCRYPT(TO_BINARY(C.LAST_NAME), 'placeholder_symmetric_key', TO_BINARY('123')),
          FIRST_NAME_ENCRYPTED = ENCRYPT(TO_BINARY(C.FIRST_NAME), 'placeholder_symmetric_key', TO_BINARY('123')),
          ORGANIZATION_ENCRYPTED = ENCRYPT(TO_BINARY(C.ORGANIZATION), 'placeholder_symmetric_key', TO_BINARY('123')),
          ADDRESS_ENCRYPTED = ENCRYPT(TO_BINARY(C."ADDRESS"), 'placeholder_symmetric_key', TO_BINARY('123')),
          SSN_ENCRYPTED = ENCRYPT(TO_BINARY(C.SSN), 'placeholder_symmetric_key', TO_BINARY('123')),
          PHONE_ENCRYPTED = ENCRYPT(TO_BINARY(C.PHONE), 'placeholder_symmetric_key', TO_BINARY('123')),
          CLAIMANT = NULL,
          LAST_NAME = NULL,
          FIRST_NAME = NULL,
          ORGANIZATION = NULL,
          "ADDRESS" = NULL,
          SSN = NULL,
          PHONE = NULL,
          ACA_EMPLOYMENT_STATUS_ID = SOURCE.NEW_ACA_EMPLOYMENT_STATUS_ID,
          EMPLOYMENT_STATUS = SOURCE.NEW_EMPLOYMENT_STATUS,
          ACA_MARITAL_STATUS_ID = SOURCE.NEW_ACA_MARITAL_STATUS_ID,
          MARITAL_STATUS = SOURCE.NEW_MARITAL_STATUS,
          ACA_SOURCE_SYSTEM_ID = SOURCE.NEW_ACA_SOURCE_SYSTEM_ID,
          ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          ACA_UPDATE_USER = 'dbo.spaca_aca_claimant_staging_esis_update'
      FROM (
          SELECT
              C_INNER.ACA_CLAIMANT_STAGING_ESIS_ID,
              IFNULL(E.ACA_EMPLOYMENT_STATUS_ESIS_ID, -1) AS NEW_ACA_EMPLOYMENT_STATUS_ID,
              E.EMPLOYMENT_STATUS AS NEW_EMPLOYMENT_STATUS,
              IFNULL(M.ACA_MARITAL_STATUS_ID, -1) AS NEW_ACA_MARITAL_STATUS_ID,
              M.MARITAL_STATUS AS NEW_MARITAL_STATUS,
              S.ACA_SOURCE_SYSTEM_ID AS NEW_ACA_SOURCE_SYSTEM_ID
          FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIMANT_STAGING_ESIS AS C_INNER
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM AS S ON S.SOURCE_SYSTEM = C_INNER.SOURCE_SYSTEM
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_EMPLOYMENT_STATUS_ESIS AS E ON E.EMPLOYMENT_STATUS_CODE = C_INNER.EMPLOYMENT_STATUS_CODE
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_MARITAL_STATUS AS M ON M.MARITAL_STATUS_CODE = C_INNER.MARITAL_STATUS_CODE
      ) AS SOURCE
      WHERE C.ACA_CLAIMANT_STAGING_ESIS_ID = SOURCE.ACA_CLAIMANT_STAGING_ESIS_ID;
      END;
