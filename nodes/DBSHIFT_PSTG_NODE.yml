      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;

      UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_DATE_SOURCE_TABLE TGT
      SET
          loaded_flag = 1,
          inserted_record_count = -1, -- Placeholder for dynamic @@ROWCOUNT from procedural logic
          aca_date_updated = CURRENT_TIMESTAMP(),
          aca_update_user = 'dbo.spaca_aca_control_package_date_source_table_update'
      FROM (
          SELECT dt.aca_control_package_date_source_table_id
          FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_DATE AS d
          INNER JOIN ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_DATE_SOURCE_TABLE AS dt
              ON dt.aca_control_package_date_id = d.aca_control_package_date_id
          INNER JOIN ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_SOURCE_TABLE AS t
              ON t.aca_control_package_source_table_id = dt.aca_control_package_source_table_id
          WHERE dt.loaded_flag = 0
      ) AS SRC
      WHERE TGT.aca_control_package_date_source_table_id = SRC.aca_control_package_date_source_table_id;
      END;
