name: PSTG_SPACA_ACA_CLAIM_TRANSACTION_STAGING_GB_UPDATE
operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
          USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;

          UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_GB
          SET
              ACA_CLAIM_ID = SOURCE.NEW_ACA_CLAIM_ID,
              ACA_CLAIMANT_ID = SOURCE.NEW_ACA_CLAIMANT_ID,
              ACA_DATE_ID_TRANSACTION_DATE = SOURCE.NEW_ACA_DATE_ID_TRANSACTION_DATE,
              ACA_DATE_ID_STATUS_DATE = SOURCE.NEW_ACA_DATE_ID_STATUS_DATE,
              ACA_DATE_ID_REPORTED_DATE = SOURCE.NEW_ACA_DATE_ID_REPORTED_DATE,
              ACA_DATE_ID_ACCIDENT_DATE = SOURCE.NEW_ACA_DATE_ID_ACCIDENT_DATE,
              ACA_POLICY_ID = SOURCE.NEW_ACA_POLICY_ID,
              ACA_CLAIM_ATTRIBUTE_ID = SOURCE.NEW_ACA_CLAIM_ATTRIBUTE_ID,
              ACA_CURRENT_FLAG = SOURCE.NEW_ACA_CURRENT_FLAG,
              ACA_TRANSACTION_DATE = SOURCE.NEW_ACA_TRANSACTION_DATE,
              MAX_TRANSACTION_DATE_PER_CLAIM = SOURCE.NEW_MAX_TRANSACTION_DATE_PER_CLAIM,
              NEXT_TRANSACTION_DATE = SOURCE.NEW_NEXT_TRANSACTION_DATE,
              ACA_ACCIDENT_SOURCE_CODE_ID = SOURCE.NEW_ACA_ACCIDENT_SOURCE_CODE_ID,
              DESCRIPTION_OF_LOSS = NULL,
              VEHICLE_IDENTIFICATION_NUMBER = NULL,
              CLAIMANT = NULL,
              CLAIMANT_SSN = NULL,
              ACA_SOURCE_SYSTEM_ID = SOURCE.NEW_ACA_SOURCE_SYSTEM_ID,
              ACA_UPDATE_USER = 'spaca_aca_claim_transaction_staging_gb_update',
              ACA_DATE_UPDATED = CURRENT_TIMESTAMP()
          FROM (
              SELECT
                  S.SOURCE_SYSTEM_CLAIM_ID AS PK_SOURCE_SYSTEM_CLAIM_ID,
                  S.SOURCE_SYSTEM_TRANSACTION_DATE AS PK_SOURCE_SYSTEM_TRANSACTION_DATE,
                  IFNULL(CL.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,
                  IFNULL(C.ACA_CLAIMANT_ID, -1) AS NEW_ACA_CLAIMANT_ID,
                  IFNULL(TRY_TO_NUMBER(TO_CHAR(S.SOURCE_SYSTEM_TRANSACTION_DATE, 'YYYYMMDD')), -1) AS NEW_ACA_DATE_ID_TRANSACTION_DATE,
                  IFNULL(TRY_TO_NUMBER(TO_CHAR(S.STATUS_DATE, 'YYYYMMDD')), -1) AS NEW_ACA_DATE_ID_STATUS_DATE,
                  IFNULL(TRY_TO_NUMBER(TO_CHAR(S.REPORTED_DATE, 'YYYYMMDD')), -1) AS NEW_ACA_DATE_ID_REPORTED_DATE,
                  IFNULL(TRY_TO_NUMBER(TO_CHAR(S.ACCIDENT_DATE, 'YYYYMMDD')), -1) AS NEW_ACA_DATE_ID_ACCIDENT_DATE,
                  IFNULL(P.ACA_POLICY_ID, -1) AS NEW_ACA_POLICY_ID,
                  IFNULL(CA.ACA_CLAIM_ATTRIBUTE_ID, -1) AS NEW_ACA_CLAIM_ATTRIBUTE_ID,
                  IFF(S.SOURCE_SYSTEM_TRANSACTION_DATE = MX.MAX_TRANSACTION_DATE_PER_CLAIM, 'Y' , 'N') AS NEW_ACA_CURRENT_FLAG,
                  S.SOURCE_SYSTEM_TRANSACTION_DATE AS NEW_ACA_TRANSACTION_DATE,
                  MX.MAX_TRANSACTION_DATE_PER_CLAIM AS NEW_MAX_TRANSACTION_DATE_PER_CLAIM,
                  MX.NEXT_TRANSACTION_DATE AS NEW_NEXT_TRANSACTION_DATE,
                  IFNULL(ASCO.ACA_ACCIDENT_SOURCE_CODE_ID, -1) AS NEW_ACA_ACCIDENT_SOURCE_CODE_ID,
                  SRC_SYS.ACA_SOURCE_SYSTEM_ID AS NEW_ACA_SOURCE_SYSTEM_ID
              FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_GB S
              INNER JOIN (
                  SELECT
                      SOURCE_SYSTEM_CLAIM_ID,
                      SOURCE_SYSTEM_TRANSACTION_DATE,
                      DATEADD(DAY, -1, LEAD(SOURCE_SYSTEM_TRANSACTION_DATE, 1) OVER (PARTITION BY SOURCE_SYSTEM_CLAIM_ID ORDER BY SOURCE_SYSTEM_TRANSACTION_DATE ASC)) AS NEXT_TRANSACTION_DATE,
                      MAX(SOURCE_SYSTEM_TRANSACTION_DATE) OVER (PARTITION BY SOURCE_SYSTEM_CLAIM_ID) AS MAX_TRANSACTION_DATE_PER_CLAIM
                  FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_GB
              ) MX ON S.SOURCE_SYSTEM_CLAIM_ID = MX.SOURCE_SYSTEM_CLAIM_ID AND S.SOURCE_SYSTEM_TRANSACTION_DATE = MX.SOURCE_SYSTEM_TRANSACTION_DATE
              CROSS JOIN (
                  SELECT ACA_SOURCE_SYSTEM_ID
                  FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM
                  WHERE SOURCE_SYSTEM = 'GB'
              ) SRC_SYS
              LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM CL ON S.SOURCE_SYSTEM_CLAIM_ID = CL.SOURCE_SYSTEM_CLAIM_ID AND CL.ACA_SOURCE_SYSTEM_ID = SRC_SYS.ACA_SOURCE_SYSTEM_ID
              LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIMANT C ON S.SOURCE_SYSTEM_CLAIMANT_ID = C.SOURCE_SYSTEM_CLAIMANT_ID 
              LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY P ON P.SOURCE_SYSTEM_POLICY_ID = S.SOURCE_SYSTEM_POLICY_ID 
              LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM_ATTRIBUTE CA ON S.SOURCE_SYSTEM_CLAIM_ATTRIBUTE_ID = CA.SOURCE_SYSTEM_CLAIM_ATTRIBUTE_ID
              LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_ACCIDENT_SOURCE_CODE ASCO ON ASCO.SOURCE_SYSTEM_ACCIDENT_SOURCE_CODE_ID = S.SOURCE_SYSTEM_ACCIDENT_SOURCE_CODE_ID
          ) AS SOURCE
          WHERE ACA_CLAIM_TRANSACTION_STAGING_GB.SOURCE_SYSTEM_CLAIM_ID = SOURCE.PK_SOURCE_SYSTEM_CLAIM_ID
            AND ACA_CLAIM_TRANSACTION_STAGING_GB.SOURCE_SYSTEM_TRANSACTION_DATE = SOURCE.PK_SOURCE_SYSTEM_TRANSACTION_DATE;
      END;
    testsEnabled: true
    truncateBefore: false
