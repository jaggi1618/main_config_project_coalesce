name: ACA_RESERVE_TRANSACTION_STAGING_ESIS
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
      
          UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RESERVE_TRANSACTION_STAGING_ESIS AS T
          SET
              T.SOURCE_SYSTEM_RESERVE_TRANSACTION_ID = S.NEW_SOURCE_SYSTEM_RESERVE_TRANSACTION_ID,
              T.ACA_CLAIM_ID = S.NEW_ACA_CLAIM_ID,
              T.ACA_RESERVE_TYPE_ID = S.NEW_ACA_RESERVE_TYPE_ID,
              T.ACA_POLICY_ID = S.NEW_ACA_POLICY_ID,
              T.ACA_DATE_ID_TRANSACTION_DATE = S.NEW_ACA_DATE_ID_TRANSACTION_DATE,
              T.POLICY_NUMBER = S.NEW_POLICY_NUMBER,
              T.POLICY_EFFECTIVE_DATE = S.NEW_POLICY_EFFECTIVE_DATE,
              T.COVERAGE_GROUP_CODE = S.NEW_COVERAGE_GROUP_CODE,
              T.RESERVE_TYPE = S.NEW_RESERVE_TYPE,
              T.ACA_SOURCE_SYSTEM_ID = S.SOURCESYSTEMIDESIS,
              T.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
              T.ACA_UPDATE_USER = 'dbo.spaca_aca_reserve_transaction_staging_esis_update'
          FROM (
              SELECT
                  T_INNER.SOURCE_SYSTEM_CLAIM_ID,
                  T_INNER.TRANSACTION_DATE,
                  T_INNER.TRANSACTION_SEQUENCE_NUMBER,
                  T_INNER.PAYMENT_TYPE_CODE,
                  MD5(CONCAT_WS('||', T_INNER.SOURCE_SYSTEM_CLAIM_ID, T_INNER.TRANSACTION_DATE, T_INNER.TRANSACTION_SEQUENCE_NUMBER, RT.TRANSACTION_GROUP)) AS NEW_SOURCE_SYSTEM_RESERVE_TRANSACTION_ID,
                  IFNULL(C.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,
                  IFNULL(RT.ACA_RESERVE_TYPE_ID, -1) AS NEW_ACA_RESERVE_TYPE_ID,
                  COALESCE(T_INNER.ACA_POLICY_ID, PO.ACA_POLICY_ID, MC.ACA_POLICY_ID, -1) AS NEW_ACA_POLICY_ID,
                  TRY_CAST(TO_VARCHAR(T_INNER.TRANSACTION_DATE, 'YYYYMMDD') AS INT) AS NEW_ACA_DATE_ID_TRANSACTION_DATE,
                  IFNULL(T_INNER.POLICY_NUMBER, MC.POLICY_NUMBER) AS NEW_POLICY_NUMBER,
                  IFNULL(T_INNER.POLICY_EFFECTIVE_DATE, MC.EFFECTIVE_DATE) AS NEW_POLICY_EFFECTIVE_DATE,
                  IFNULL(T_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE) AS NEW_COVERAGE_GROUP_CODE,
                  RT.TRANSACTION_GROUP AS NEW_RESERVE_TYPE,
                  (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = (SELECT MAX(SOURCE_SYSTEM) FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RESERVE_TRANSACTION_STAGING_ESIS)) AS SOURCESYSTEMIDESIS
              FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RESERVE_TRANSACTION_STAGING_ESIS AS T_INNER
              LEFT JOIN {{ ref('DBSHIFT', 'ACA_CLAIM') }} AS C ON C.SOURCE_SYSTEM_CLAIM_ID = T_INNER.SOURCE_SYSTEM_CLAIM_ID
              LEFT JOIN {{ ref('DBSHIFT', 'ACA_POLICY') }} AS PO ON PO.SOURCE_SYSTEM_POLICY_ID = T_INNER.SOURCE_SYSTEM_POLICY_ID
              LEFT JOIN {{ ref('DBSHIFT', 'STG_ESIS_MISSING_CLAIM_POLICY') }} AS MC ON MC.SOURCE_SYSTEM_CLAIM_ID = T_INNER.SOURCE_SYSTEM_CLAIM_ID
              LEFT JOIN {{ ref('DBSHIFT', 'ACA_RESERVE_TYPE_MAPPING') }} AS RT ON RT.PAYMENT_TYPE_CODE = T_INNER.PAYMENT_TYPE_CODE
                  AND RT.COVERAGE_GROUP_CODE = IFNULL(T_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE)
                  AND RT.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = (SELECT MAX(SOURCE_SYSTEM) FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RESERVE_TRANSACTION_STAGING_ESIS))
          ) AS S
          WHERE T.SOURCE_SYSTEM_CLAIM_ID = S.SOURCE_SYSTEM_CLAIM_ID
            AND T.TRANSACTION_DATE = S.TRANSACTION_DATE
            AND T.TRANSACTION_SEQUENCE_NUMBER = S.TRANSACTION_SEQUENCE_NUMBER
            AND T.PAYMENT_TYPE_CODE = S.PAYMENT_TYPE_CODE;
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
