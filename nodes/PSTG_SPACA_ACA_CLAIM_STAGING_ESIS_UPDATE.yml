  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n    LET proc_name VARCHAR(100) := 'spaca_aca_claim_staging_esis_update';\n\
      \    LET current_timestamp TIMESTAMP_NTZ := CURRENT_TIMESTAMP();\n    LET source_system\
      \ VARCHAR(25) := 'ESIS';\n    LET authenticator VARCHAR(3) := '123';\n    LET\
      \ aca_source_system_id INT;\n\n    SELECT aca_source_system_id INTO :aca_source_system_id\n\
      \    FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM\n    WHERE source_system\
      \ = :source_system;\n\n    UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_STAGING_ESIS\
      \ AS e\n    SET \n        aca_source_system_id = :aca_source_system_id,\n  \
      \      aca_account_structure_id = (\n            SELECT COALESCE(MAX(ac.aca_account_structure_id),\
      \ -1)\n            FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_ACCOUNT_STRUCTURE ac\n\
      \            WHERE e.source_system_account_structure_id = ac.source_system_account_structure_id\n\
      \              AND ac.aca_source_system_id = :aca_source_system_id\n       \
      \ ),\n        aca_date_id_claim_date = COALESCE(TRY_CAST(TO_CHAR(e.claim_date,\
      \ 'YYYYMMDD') AS NUMBER(10,0)), -1),\n        aca_date_id_original_open_date\
      \ = COALESCE(TRY_CAST(TO_CHAR(e.original_open_date, 'YYYYMMDD') AS NUMBER(10,0)),\
      \ -1),\n        employee_identification_number_encrypted = COALESCE(e.employee_identification_number_encrypted,\
      \ ENCRYPT(TO_BINARY(e.employee_identification_number), '<Your-Passphrase-Here>')),\n\
      \        employer_federal_tax_identification_number_encrypted = COALESCE(e.employer_federal_tax_identification_number_encrypted,\
      \ ENCRYPT(TO_BINARY(e.employer_federal_tax_identification_number), '<Your-Passphrase-Here>')),\n\
      \        death_date_encrypted = COALESCE(e.death_date_encrypted, ENCRYPT(TO_BINARY(CAST(e.death_date\
      \ AS VARCHAR(25))), '<Your-Passphrase-Here>')),\n        employee_identification_number\
      \ = NULL,\n        employer_federal_tax_identification_number = NULL,\n    \
      \    death_date = NULL,\n        aca_date_updated = :current_timestamp,\n  \
      \      aca_update_user = :proc_name;\nEND;"
