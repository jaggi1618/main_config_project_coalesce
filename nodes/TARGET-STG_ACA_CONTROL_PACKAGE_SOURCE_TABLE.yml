name: STG_ACA_CONTROL_PACKAGE_SOURCE_TABLE
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          LET drop_sql VARCHAR(16777216);
          LET backup_sql VARCHAR(16777216);

          -- STEP 1: Drop existing unbacked-up backup tables
          SELECT 'BEGIN ' || LISTAGG(
                     'EXECUTE IMMEDIATE ''DROP TABLE IF EXISTS '
                     || database_name || '.' || schema_name || '.' || table_name || backup_table_name_postfix
                     || ''';'
                 , ' ') || ' END;'
            INTO :drop_sql
            FROM {{ ref_no_link('SRC', 'ACA_CONTROL_PACKAGE_SOURCE_TABLE') }}
           WHERE backed_up_flag = 0
             AND source_group_id = 1;

          IF (:drop_sql IS NOT NULL AND :drop_sql != 'BEGIN  END;') THEN
              EXECUTE IMMEDIATE :drop_sql;
          END IF;

          -- STEP 2: Create backup tables + truncate source tables
          SELECT 'BEGIN ' || LISTAGG(
                     'EXECUTE IMMEDIATE ''CREATE TABLE '
                     || database_name || '.' || schema_name || '.' || table_name || backup_table_name_postfix
                     || ' AS SELECT * FROM ' || database_name || '.' || schema_name || '.' || table_name
                     || '''; '
                     || 'EXECUTE IMMEDIATE ''TRUNCATE TABLE '
                     || database_name || '.' || schema_name || '.' || table_name
                     || ''';'
                 , ' ') || ' END;'
            INTO :backup_sql
            FROM {{ ref_no_link('SRC', 'ACA_CONTROL_PACKAGE_SOURCE_TABLE') }}
           WHERE backed_up_flag = 0
             AND source_group_id = 1;

          IF (:backup_sql IS NOT NULL AND :backup_sql != 'BEGIN  END;') THEN
              EXECUTE IMMEDIATE :backup_sql;
          END IF;

          -- STEP 3: Bulk UPDATE flag
          UPDATE {{ ref_no_link('SRC', 'ACA_CONTROL_PACKAGE_SOURCE_TABLE') }}
             SET backed_up_flag = 1,
                 aca_date_updated = CURRENT_TIMESTAMP(),
                 aca_update_user = 'spaca_aca_control_package_source_table_update'
           WHERE backed_up_flag = 0
             AND source_group_id = 1;

      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
