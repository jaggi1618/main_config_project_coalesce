    preSQL: |
      BEGIN
      UPDATE {{this}} AS pl
      SET
          DELETED_DATE = CURRENT_TIMESTAMP(),
          DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
          DW_UPDATE_USER = 'spdw_dw_client_benchmarking_policy_line_insertUpdate'
      FROM (
          SELECT
              pl_inner.SOURCE_SYSTEM_POLICY_LINE_ID
          FROM {{this}} AS pl_inner
          LEFT JOIN {{ ref('DBSHIFT', 'DW_CLIENT_BENCHMARKING_POLICY_LINE_STAGING') }} AS stg
              ON stg.SOURCE_SYSTEM_POLICY_LINE_ID = pl_inner.SOURCE_SYSTEM_POLICY_LINE_ID
          WHERE stg.SOURCE_SYSTEM_POLICY_LINE_ID IS NULL AND pl_inner.DELETED_DATE IS NULL
      ) AS deletes
      WHERE pl.SOURCE_SYSTEM_POLICY_LINE_ID = deletes.SOURCE_SYSTEM_POLICY_LINE_ID;
