name: ACA_CLAIM_ATTRIBUTE
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          USE DATABASE ALLIANT_CLAIMS_ASTRUS;
          UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM_ATTRIBUTE AS CA
          SET
              CLAIM_STATUS_DESCRIPTION = ST.CLAIM_STATUS_DESCRIPTION,
              DEATH_RESULT_DESCRIPTION = ST.DEATH_RESULT_DESCRIPTION,
              REPORTING_BASIS_DESCRIPTION = ST.REPORTING_BASIS_DESCRIPTION,
              CLAIMANT_TYPE = ST.CLAIMANT_TYPE,
              WORKERS_COMPENSATION_CLAIM_TYPE = ST.WORKERS_COMPENSATION_CLAIM_TYPE,
              DEGREE_OF_LOSS_DESCRIPTION = ST.DEGREE_OF_LOSS_DESCRIPTION,
              APPRAISED_ELIGIBILITY_DESCRIPTION = ST.APPRAISED_ELIGIBILITY_DESCRIPTION,
              ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
              ACA_UPDATE_USER = 'DBO.SPACA_ACA_CLAIM_ATTRIBUTE_INSERTUPDATE'
          FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_CLAIM_ATTRIBUTE_STAGING') }} AS ST
          WHERE CA.SOURCE_SYSTEM_CLAIM_ATTRIBUTE_ID = ST.SOURCE_SYSTEM_CLAIM_ATTRIBUTE_ID
          AND CA.ACA_DATE_CREATED <> CURRENT_TIMESTAMP()
          AND (
              IFNULL(CA.DEATH_RESULT_DESCRIPTION, '') <> IFNULL(ST.DEATH_RESULT_DESCRIPTION, '')
              OR IFNULL(CA.REPORTING_BASIS_DESCRIPTION, '') <> IFNULL(ST.REPORTING_BASIS_DESCRIPTION, '')
              OR IFNULL(CA.CLAIMANT_TYPE, '') <> IFNULL(ST.CLAIMANT_TYPE, '')
              OR IFNULL(CA.WORKERS_COMPENSATION_CLAIM_TYPE, '') <> IFNULL(ST.WORKERS_COMPENSATION_CLAIM_TYPE, '')
              OR IFNULL(CA.DEGREE_OF_LOSS_DESCRIPTION, '') <> IFNULL(ST.DEGREE_OF_LOSS_DESCRIPTION, '')
              OR IFNULL(CA.APPRAISED_ELIGIBILITY_DESCRIPTION, '') <> IFNULL(ST.APPRAISED_ELIGIBILITY_DESCRIPTION, '')
          );
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: false
