name: ACA_RECOVERY_TRANSACTION_STAGING_ESIS_UPDATE
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      MERGE INTO ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS AS TGT
      USING (
          SELECT
              R_INNER.SOURCE_SYSTEM_CLAIM_ID,
              R_INNER.SOURCE_SYSTEM_POLICY_ID,
              R_INNER.RECOVERY_TRANSACTION_DATE,
              R_INNER.TRANSACTION_SEQUENCE_NUMBER,
              R_INNER.PAYMENT_TYPE_CODE,
              R_INNER.COVERAGE_GROUP_CODE,
              C.ACA_CLAIM_ID,
              PO.ACA_POLICY_ID,
              MC.SOURCE_SYSTEM_POLICY_ID AS MC_SOURCE_SYSTEM_POLICY_ID,
              MC.ACA_POLICY_ID AS MC_ACA_POLICY_ID,
              MC.CLAIM_COVERAGE_CODE AS MC_CLAIM_COVERAGE_CODE,
              RT.ACA_RESERVE_TYPE_ID,
              RT.TRANSACTION_GROUP
          FROM {{ ref('DBSHIFT', 'ACA_RECOVERY_TRANSACTION_STAGING_ESIS') }} AS R_INNER
          LEFT JOIN {{ ref('DBSHIFT', 'ACA_CLAIM') }} AS C ON C.SOURCE_SYSTEM_CLAIM_ID = R_INNER.SOURCE_SYSTEM_CLAIM_ID
          LEFT JOIN {{ ref('DBSHIFT', 'ACA_POLICY') }} AS PO ON PO.SOURCE_SYSTEM_POLICY_ID = R_INNER.SOURCE_SYSTEM_POLICY_ID
          LEFT JOIN {{ ref('DBSHIFT', 'STG_ESIS_MISSING_CLAIM_POLICY') }} AS MC ON MC.SOURCE_SYSTEM_CLAIM_ID = R_INNER.SOURCE_SYSTEM_CLAIM_ID
          LEFT JOIN {{ ref('DBSHIFT', 'ACA_RESERVE_TYPE_MAPPING') }} AS RT
              ON RT.PAYMENT_TYPE_CODE = R_INNER.PAYMENT_TYPE_CODE
              AND RT.COVERAGE_GROUP_CODE = IFNULL(R_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE)
              AND RT.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'V_SOURCE_SYSTEM_ID_ESIS') }})
      ) AS SRC
      ON TGT.SOURCE_SYSTEM_CLAIM_ID = SRC.SOURCE_SYSTEM_CLAIM_ID AND IFF(TGT.RECOVERY_TRANSACTION_DATE IS NULL AND SRC.RECOVERY_TRANSACTION_DATE IS NULL, true, TGT.RECOVERY_TRANSACTION_DATE = SRC.RECOVERY_TRANSACTION_DATE) AND IFF(TGT.TRANSACTION_SEQUENCE_NUMBER IS NULL AND SRC.TRANSACTION_SEQUENCE_NUMBER IS NULL, true, TGT.TRANSACTION_SEQUENCE_NUMBER = SRC.TRANSACTION_SEQUENCE_NUMBER)
      WHEN MATCHED THEN UPDATE SET
          TGT.SOURCE_SYSTEM_POLICY_ID = IFNULL(TGT.SOURCE_SYSTEM_POLICY_ID, SRC.MC_SOURCE_SYSTEM_POLICY_ID),
          TGT.ACA_CLAIM_ID = IFNULL(SRC.ACA_CLAIM_ID, -1),
          TGT.ACA_RESERVE_TYPE_ID = IFNULL(SRC.ACA_RESERVE_TYPE_ID, -1),
          TGT.ACA_POLICY_ID = COALESCE(TGT.ACA_POLICY_ID, SRC.ACA_POLICY_ID, SRC.MC_ACA_POLICY_ID, -1),
          TGT.SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID = MD5(TO_VARCHAR(OBJECT_CONSTRUCT('unique_claim_id', TGT.SOURCE_SYSTEM_CLAIM_ID, 'recovery_transaction_date', TGT.RECOVERY_TRANSACTION_DATE, 'transaction_sequence_number', TGT.TRANSACTION_SEQUENCE_NUMBER, 'reserve_type', SRC.TRANSACTION_GROUP))),
          TGT.COVERAGE_GROUP_CODE = IFNULL(TGT.COVERAGE_GROUP_CODE, SRC.MC_CLAIM_COVERAGE_CODE),
          TGT.RESERVE_TYPE = SRC.TRANSACTION_GROUP,
          TGT.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'V_SOURCE_SYSTEM_ID_ESIS') }}),
          TGT.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          TGT.ACA_UPDATE_USER = 'spaca_aca_recovery_transaction_staging_esis_update';
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
