name: DIM_AO_CLAIM
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      USE DATABASE ALLIANT_ONE;
      UPDATE ALLIANT_ONE.DBO.DIM_AO_CLAIM AS c
      SET c.load_to_sf_flag = 'I'
      FROM {{ ref('DBSHIFT', 'SF_CLAIM_ID_STAGE') }} AS sf 
      WHERE c.source_system_claim_id NOT IN (SELECT source_system_claim_id FROM {{ ref('DBSHIFT', 'SF_CLAIM_ID_STAGE') }}) 
      AND c.load_to_sf_flag = 'N';
      UPDATE ALLIANT_ONE.DBO.DIM_AO_CLAIM AS c
      SET 
          c.sf_account_id = tmp.sf_account_id,
          c.load_to_sf_flag = 'U'
      FROM {{ ref('DBSHIFT', 'V_TMP_AO_RESPONSE_FEED') }} AS tmp
      WHERE c.epic_client_lookup_code = tmp.epic_client_lookup_code
        AND tmp.rNum = 1
        AND tmp.sf_account_id <> c.sf_account_id
        AND c.load_to_sf_flag <> 'I';
      END;
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_ONE;
      UPDATE ALLIANT_ONE.DBO.DIM_AO_CLAIM
      SET LOAD_TO_SF_FLAG = 'N'
      WHERE LOAD_TO_SF_FLAG IN ('I', 'U');
      END;
    testsEnabled: true
    truncateBefore: false
