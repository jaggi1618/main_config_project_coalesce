          - locationName: DBSHIFT
            nodeName: ACA_SOURCE_SYSTEM
        join:
          joinCondition: |-
            FROM {{ ref('DBSHIFT', 'ACA_RESERVE_TRANSACTION') }} AS res
            INNER JOIN MIN_TRANSACTION_DATE AS c ON C.SOURCE_SYSTEM_CLAIM_ID = RES.SOURCE_SYSTEM_CLAIM_ID
                AND C.ACA_RESERVE_TYPE_ID = RES.ACA_RESERVE_TYPE_ID
                AND C.ACA_DATE_ID_TRANSACTION_DATE > RES.ACA_DATE_ID_TRANSACTION_DATE
            WHERE RES.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'GB')
            GROUP BY RES.SOURCE_SYSTEM_CLAIM_ID, RES.ACA_RESERVE_TYPE_ID
