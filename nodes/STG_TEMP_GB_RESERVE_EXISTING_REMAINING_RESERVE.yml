    cteString: |-
      WITH MIN_TRANSACTION_DATE AS (
          SELECT
              SOURCE_SYSTEM_CLAIM_ID,
              ACA_RESERVE_TYPE_ID,
              MIN(ACA_DATE_ID_TRANSACTION_DATE) AS ACA_DATE_ID_TRANSACTION_DATE
          FROM {{ ref('DBSHIFT', 'STG_TEMP_GB_RESERVE_NEW_TRANSACTION') }}
          GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID
      )
    enabledColumnTestIDs: []
