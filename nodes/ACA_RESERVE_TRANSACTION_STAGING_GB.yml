            LEFT JOIN {{ ref('DBSHIFT', 'STG_TEMP_GB_RESERVE_TOTAL_PAYMENT') }} AS pmt ON PMT.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID AND PMT.ACA_RESERVE_TYPE_ID = C.ACA_RESERVE_TYPE_ID AND PMT.TRANSACTION_DATE = C.TRANSACTION_DATE
            LEFT JOIN {{ ref('DBSHIFT', 'STG_TEMP_GB_RESERVE_TOTAL_RECOVERY') }} AS rec ON REC.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID AND REC.ACA_RESERVE_TYPE_ID = C.ACA_RESERVE_TYPE_ID AND REC.TRANSACTION_DATE = C.TRANSACTION_DATE
            LEFT JOIN {{ ref('DBSHIFT', 'STG_TEMP_GB_RESERVE_TOTAL_INCURRED') }} AS inc ON INC.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID AND INC.ACA_RESERVE_TYPE_ID = C.ACA_RESERVE_TYPE_ID AND INC.TRANSACTION_DATE = C.TRANSACTION_DATE
