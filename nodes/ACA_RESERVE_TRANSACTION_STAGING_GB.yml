            LEFT JOIN {{ ref('DBSHIFT', 'STG_TEMP_GB_RESERVE_EXISTING_REMAINING_RESERVE') }} AS res ON RES.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID AND RES.ACA_RESERVE_TYPE_ID = C.ACA_RESERVE_TYPE_ID
