    preSQL: |-
      BEGIN
        USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;

        -- This script replicates the dynamic SQL from the original stored procedure.
        -- It is intended to be run against a table specified by a variable,
        -- which would be configured in the Coalesce/DBT project.
        LET TargetTableName VARCHAR := '{{ var("target_table_for_cleanup") }}';
        LET update_clause VARCHAR;
        LET sql_stmt VARCHAR;

        -- 1. Trim leading and trailing spaces
        SELECT LISTAGG('"' || COLUMN_NAME || '" = TRIM("' || COLUMN_NAME || '")', ', ')
        INTO :update_clause
        FROM INFORMATION_SCHEMA.COLUMNS
        WHERE TABLE_SCHEMA = CURRENT_SCHEMA() AND TABLE_NAME = UCASE(:TargetTableName)
          AND DATA_TYPE IN ('TEXT', 'VARCHAR', 'CHAR', 'NVARCHAR', 'NCHAR');

        IF (:update_clause IS NOT NULL AND :update_clause != '') THEN
          sql_stmt := 'UPDATE IDENTIFIER(?) SET ' || :update_clause;
          EXECUTE IMMEDIATE :sql_stmt USING (TargetTableName);
        END IF;

        -- 2. Convert empty strings to NULL
        SELECT LISTAGG('"' || COLUMN_NAME || '" = IFF(LENGTH("' || COLUMN_NAME || '") = 0, NULL, "' || COLUMN_NAME || '")', ', ')
        INTO :update_clause
        FROM INFORMATION_SCHEMA.COLUMNS
        WHERE TABLE_SCHEMA = CURRENT_SCHEMA() AND TABLE_NAME = UCASE(:TargetTableName)
          AND DATA_TYPE IN ('TEXT', 'VARCHAR', 'CHAR', 'NVARCHAR', 'NCHAR');

        IF (:update_clause IS NOT NULL AND :update_clause != '') THEN
          sql_stmt := 'UPDATE IDENTIFIER(?) SET ' || :update_clause;
          EXECUTE IMMEDIATE :sql_stmt USING (TargetTableName);
        END IF;

        -- 3. Convert literal string 'NULL' to NULL
        SELECT LISTAGG('"' || COLUMN_NAME || '" = IFF("' || COLUMN_NAME || '" = ''NULL'', NULL, "' || COLUMN_NAME || '")', ', ')
        INTO :update_clause
        FROM INFORMATION_SCHEMA.COLUMNS
        WHERE TABLE_SCHEMA = CURRENT_SCHEMA() AND TABLE_NAME = UCASE(:TargetTableName)
          AND DATA_TYPE IN ('TEXT', 'VARCHAR', 'CHAR', 'NVARCHAR', 'NCHAR');

        IF (:update_clause IS NOT NULL AND :update_clause != '') THEN
          sql_stmt := 'UPDATE IDENTIFIER(?) SET ' || :update_clause;
          EXECUTE IMMEDIATE :sql_stmt USING (TargetTableName);
        END IF;
      END;
