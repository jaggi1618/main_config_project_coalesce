    sourceMapping:
      - aliases: {}
        customSQL:
          customSQL: |-
            WITH MAX_GROUP_INFO AS (
                SELECT
                    MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, CHARINDEX('_', PARENT_PLANNING_ID) - 1) AS INT)) AS MAX_GROUP_ID,
                    (
                        SELECT COUNT(1)
                        FROM {{ ref('DBSHIFT', 'PLANNING_FCCS_BROKER') }}
                        WHERE TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, CHARINDEX('_', PARENT_PLANNING_ID) - 1) AS INT) =
                              (SELECT MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, CHARINDEX('_', PARENT_PLANNING_ID) - 1) AS INT)) FROM {{ ref('DBSHIFT', 'PLANNING_FCCS_BROKER') }})
                    ) AS COUNT_OF_MAX_GROUP_ID
                FROM {{ ref('DBSHIFT', 'PLANNING_FCCS_BROKER') }}
            ),
            BROKERS_TO_UPDATE AS (
                SELECT
                    *,
                    ROW_NUMBER() OVER (ORDER BY PLANNING_ID) AS UPDATE_SEQUENCE
                FROM {{ ref('DBSHIFT', 'V_BROKER_LIST_TO_UPDATE') }}
            )
            SELECT
                B.PLANNING_ID,
                B.BROKER_NAME,
                B.EXISTING_PARENT_PLANNING_ID,
                B.EXISTING_GROUP_ID,
                IFF(
                    M.MAX_GROUP_ID IS NOT NULL AND B.EXISTING_GROUP_ID <> M.MAX_GROUP_ID AND B.UPDATE_SEQUENCE <= (300 - M.COUNT_OF_MAX_GROUP_ID),
                    M.MAX_GROUP_ID,
                    COALESCE(M.MAX_GROUP_ID, 0) + 1 + FLOOR(
                        (B.UPDATE_SEQUENCE - IFF(M.MAX_GROUP_ID IS NOT NULL AND B.EXISTING_GROUP_ID <> M.MAX_GROUP_ID, (300 - M.COUNT_OF_MAX_GROUP_ID), 0) - 1) / 300.00
                    )
                ) AS NEW_PARENT_GROUP_ID,
                NEW_PARENT_GROUP_ID || '_Producer_Parent' AS NEW_PARENT_PLANNING_ID,
                IFF(
                    NEW_PARENT_GROUP_ID > COALESCE(M.MAX_GROUP_ID, 0),
                    'Y',
                    'N'
                ) AS NEW_PARENT_FLAG
            FROM BROKERS_TO_UPDATE B
            CROSS JOIN MAX_GROUP_INFO M
        dependencies:
          - locationName: DBSHIFT
            nodeName: V_BROKER_LIST_TO_UPDATE
          - locationName: DBSHIFT
            nodeName: PLANNING_FCCS_BROKER
        join:
