  name: ACA_RECOVERY_TRANSACTION
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n    DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_RECOVERY_TRANSACTION\n\
      \    WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM\
      \ WHERE SOURCE_SYSTEM = 'GB')\n    AND RECOVERY_TRANSACTION_DATE IN (SELECT\
      \ DISTINCT RECOVERY_TRANSACTION_DATE FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_RECOVERY_TRANSACTION_STAGING_GB') }});\n\n    DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_RECOVERY_TRANSACTION\n\
      \    WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM\
      \ WHERE SOURCE_SYSTEM = 'ESIS')\n    AND RECOVERY_TRANSACTION_DATE IN (SELECT\
      \ DISTINCT RECOVERY_TRANSACTION_DATE FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_RECOVERY_TRANSACTION_STAGING_ESIS') }});\nEND;"
    testsEnabled: true
    truncateBefore: false
