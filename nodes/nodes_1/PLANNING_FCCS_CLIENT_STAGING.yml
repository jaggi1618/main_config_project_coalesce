name: PLANNING_FCCS_CLIENT_STAGING
type: Node
operation:
  name: PLANNING_FCCS_CLIENT_STAGING
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    LET current_timestamp TIMESTAMP_NTZ := CURRENT_TIMESTAMP();\n\
      \    LET proc_name VARCHAR(100) := 'sppa_planning_fccs_client_staging_insert';\n\
      \    LET no_rows DECIMAL(8, 2) := 300.00;\n    LET max_group_id INT;\n    LET\
      \ count_of_max_group_id INT;\n    LET counter INT;\n\n    CREATE OR REPLACE\
      \ TEMPORARY TABLE tmp_new_planning_client AS\n    SELECT\n        b.parent_planning_id,\n\
      \        stg.client_planning_id AS planning_id,\n        stg.client_name,\n\
      \        stg.client_lookup_code,\n        stg.client_status_indicator,\n   \
      \     stg.client_alias AS planning_alias,\n        stg.source_system,\n    \
      \    stg.dw_client_master_id,\n        REPLACE(IFF(LEFT(stg.source_system_client_lookup_code,\
      \ 1) = '-', SUBSTRING(stg.source_system_client_lookup_code, 2, LEN(stg.source_system_client_lookup_code)),\
      \ stg.source_system_client_lookup_code), '*', '') AS source_system_client_lookup_code,\n\
      \        stg.source_system_client_id,\n        stg.dw_source_system_id,\n  \
      \      ROW_NUMBER() OVER(ORDER BY stg.source_system, stg.dw_client_master_id)\
      \ AS row_id,\n        TRY_TO_NUMBER(SUBSTRING(b.parent_planning_id, 1, POSITION('_',\
      \ b.parent_planning_Id) - 1)) AS group_id,\n        b.parent_planning_id AS\
      \ group_name,\n        MIN(stg.post_date) AS begin_post_date,\n        MAX(stg.post_date)\
      \ AS end_post_date\n    FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_ACTUALS_STAGING')\
      \ }} stg\n    LEFT OUTER JOIN {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT')\
      \ }} b ON stg.client_planning_id = b.planning_id\n    WHERE stg.client_planning_id\
      \ <> 'No_Client'\n      AND IFNULL(stg.threshold_rule_type, '-1') NOT IN ('Threshold\
      \ Client', 'Threshold Structure')\n    GROUP BY\n        b.parent_planning_id,\n\
      \        stg.client_planning_id,\n        stg.client_name,\n        stg.client_lookup_code,\n\
      \        stg.client_status_indicator,\n        stg.client_alias,\n        stg.source_system,\n\
      \        stg.dw_client_master_id,\n        REPLACE(IFF(LEFT(stg.source_system_client_lookup_code,\
      \ 1) = '-', SUBSTRING(stg.source_system_client_lookup_code, 2, LEN(stg.source_system_client_lookup_code)),\
      \ stg.source_system_client_lookup_code), '*', ''),\n        stg.source_system_client_id,\n\
      \        stg.dw_source_system_id,\n        TRY_TO_NUMBER(SUBSTRING(b.parent_planning_id,\
      \ 1, POSITION('_', b.parent_planning_Id) - 1)),\n        b.parent_planning_id;\n\
      \n    CREATE OR REPLACE TEMPORARY TABLE tmp_existing_planning_client AS\n  \
      \  SELECT\n        c.planning_id,\n        c.client_lookup_code,\n        c.source_system_client_lookup_code,\n\
      \        c.source_system,\n        c.planning_alias,\n        c.dw_client_master_id\n\
      \    FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT') }}\
      \ c;\n\n    SELECT MAX(TRY_TO_NUMBER(SUBSTRING(parent_planning_id, 1, POSITION('_',\
      \ parent_planning_Id) - 1))) INTO :max_group_id FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_CLIENT') }};\n    SELECT COUNT(1) INTO :count_of_max_group_id\
      \ FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT') }} WHERE\
      \ TRY_TO_NUMBER(SUBSTRING(parent_planning_id, 1, POSITION('_', parent_planning_Id)\
      \ - 1)) = :max_group_id;\n\n    IF (:max_group_id IS NOT NULL) THEN\n      \
      \  UPDATE tmp_new_planning_client\n        SET\n            group_id = :max_group_id,\n\
      \            group_name = CONCAT(:max_group_id, '_Client_Parent'),\n       \
      \     parent_planning_id = CONCAT(:max_group_id, '_Client_Parent')\n       \
      \ FROM (\n            SELECT row_id FROM tmp_new_planning_client WHERE group_id\
      \ IS NULL ORDER BY row_id LIMIT (CAST(:no_rows AS INT) - :count_of_max_group_id)\n\
      \        ) AS source\n        WHERE tmp_new_planning_client.row_id = source.row_id;\n\
      \    END IF;\n\n    counter := IFNULL(:max_group_id, 0) + 1;\n    WHILE ((SELECT\
      \ COUNT(1) FROM tmp_new_planning_client WHERE group_id IS NULL) > 0) DO\n  \
      \      UPDATE tmp_new_planning_client\n        SET\n            group_id = :counter,\n\
      \            group_name = CONCAT(:counter, '_Client_Parent'),\n            parent_planning_id\
      \ = CONCAT(:counter, '_Client_Parent')\n        FROM (\n             SELECT\
      \ row_id FROM tmp_new_planning_client WHERE group_id IS NULL ORDER BY row_id\
      \ LIMIT CAST(:no_rows AS INT)\n        ) AS source\n        WHERE tmp_new_planning_client.row_id\
      \ = source.row_id;\n        counter := counter + 1;\n    END WHILE;\n    \n\
      \    CREATE OR REPLACE TEMPORARY TABLE tmpClientHierarchy (\n        row_id\
      \ INT IDENTITY(1,1),\n        parent VARCHAR(100),\n        member VARCHAR(100),\n\
      \        group_id INT,\n        sort_order INT\n    );\n\n    INSERT INTO tmpClientHierarchy\
      \ (parent, member, group_id, sort_order)\n    SELECT DISTINCT\n        'Total_Existing_and_General_Clients'\
      \ AS parent,\n        group_name AS member,\n        ABS(group_id) AS group_id,\n\
      \        3 AS sort_order\n    FROM tmp_new_planning_client\n    UNION\n    SELECT\n\
      \        group_name AS parent,\n        planning_id AS member, \n        ABS(group_id)\
      \ AS group_id,\n        4 AS sort_order\n    FROM tmp_new_planning_client;\n\
      \n    INSERT INTO PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT_STAGING\n    (\n\
      \        parent_planning_id, planning_id, client_name, client_lookup_code, planning_alias,\
      \ source_system_client_lookup_code,\n        source_system_client_id, dw_client_master_id,\
      \ source_system, dw_source_system_id, client_status_indicator,\n        change_type,\
      \ original_planning_id, original_lookup_code, original_planning_alias, dw_client_master_id_original,\n\
      \        begin_post_date, end_post_date, dw_date_created, dw_create_user, dw_date_updated,\
      \ dw_update_user\n    )\n    WITH cte_lookup_code_changes AS (\n        SELECT\n\
      \            'LookupCode'::VARCHAR(50) AS change_type,\n            n.planning_id\
      \ AS planning_id,\n            o.planning_id AS original_planning_id,\n    \
      \        o.source_system_client_lookup_code AS original_lookup_code,\n     \
      \       o.planning_alias AS original_planning_alias,\n            o.dw_client_master_id\
      \ AS dw_client_master_id_original\n        FROM tmp_new_planning_client n\n\
      \        INNER JOIN tmp_existing_planning_client o ON n.source_system = o.source_system\
      \ AND n.dw_client_master_id = o.dw_client_master_id\n        LEFT OUTER JOIN\
      \ {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_BROKER_CLIENT_CHANGES')\
      \ }} bcc \n            ON n.dw_client_master_id = bcc.dw_broker_client_master_id\n\
      \            AND n.source_system = bcc.source_system\n            AND bcc.dimension_type\
      \ = 'Client'\n            AND bcc.change_type = 'LookupCode'\n        WHERE\
      \ n.source_system_client_lookup_code <> o.source_system_client_lookup_code\n\
      \          AND bcc.planning_id IS NULL\n    )\n    SELECT\n        h.parent\
      \ AS parent_planning_id,\n        h.member AS planning_id,\n        IFNULL(c.client_name,\
      \ h.member) AS client_name,\n        IFNULL(c.client_lookup_code, h.member)\
      \ AS client_lookup_code,\n        IFNULL(c.planning_alias, h.member) AS planning_alias,\n\
      \        IFNULL(c.source_system_client_lookup_code, h.member) AS source_system_client_lookup_code,\n\
      \        c.source_system_client_id,\n        c.dw_client_master_id,\n      \
      \  c.source_system,\n        c.dw_source_system_id,\n        IFNULL(c.client_status_indicator,\
      \ 'N') AS client_status_indicator,\n        l.change_type,\n        l.original_planning_id,\n\
      \        l.original_lookup_code,\n        l.original_planning_alias,\n     \
      \   l.dw_client_master_id_original,\n        c.begin_post_date,\n        c.end_post_date,\n\
      \        :current_timestamp AS dw_date_created,\n        :proc_name AS dw_create_user,\n\
      \        :current_timestamp AS dw_date_updated,\n        :proc_name AS dw_update_user\n\
      \    FROM tmpClientHierarchy h\n    LEFT OUTER JOIN tmp_new_planning_client\
      \ c ON h.member = c.planning_id\n    LEFT OUTER JOIN cte_lookup_code_changes\
      \ l ON c.planning_id = l.planning_id\n    LEFT OUTER JOIN (SELECT planning_id\
      \ FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT') }} WHERE\
      \ planning_id LIKE '%_Client_Parent') p ON h.member = p.planning_id\n    WHERE\
      \ c.client_status_indicator IS NOT NULL\n       OR l.planning_id IS NOT NULL\n\
      \       OR p.planning_id IS NULL;\n\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
