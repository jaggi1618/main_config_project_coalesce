operation:
  name: TMP_NEW_PLANNING_CLIENT
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    LET no_rows DECIMAL(8, 2) := 300.00;\n    LET max_group_id\
      \ INT;\n    LET count_of_max_group_id INT;\n    LET counter INT;\n\n    SELECT\
      \ MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,1, CHARINDEX('_', PARENT_PLANNING_ID)-1)\
      \ AS INT)) INTO :max_group_id FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT')\
      \ }};\n    SELECT COUNT(1) INTO :count_of_max_group_id FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_CLIENT') }} WHERE TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,1,\
      \ CHARINDEX('_', PARENT_PLANNING_ID)-1) AS INT) = :max_group_id;\n\n    IF (:max_group_id\
      \ IS NOT NULL)\n    THEN\n        UPDATE PLANNING_ALLIANT.STG.TMP_NEW_PLANNING_CLIENT\
      \ AS t\n        SET \n            GROUP_ID = :max_group_id,\n            GROUP_NAME\
      \ =  CONCAT(:max_group_id, '_CLIENT_PARENT'),\n            PARENT_PLANNING_ID\
      \ =  CONCAT(:max_group_id, '_CLIENT_PARENT')\n        FROM (\n            SELECT\
      \ ROW_ID \n            FROM PLANNING_ALLIANT.STG.TMP_NEW_PLANNING_CLIENT \n\
      \            WHERE GROUP_ID IS NULL\n            LIMIT (CAST(:no_rows AS INT)\
      \ - :count_of_max_group_id)\n        ) AS s\n        WHERE t.ROW_ID = s.ROW_ID;\n\
      \    END IF;\n\n    counter := COALESCE(:max_group_id, 0) + 1;\n    \n    WHILE\
      \ ((SELECT COUNT(1) FROM PLANNING_ALLIANT.STG.TMP_NEW_PLANNING_CLIENT WHERE\
      \ GROUP_ID IS NULL) > 0) DO\n        UPDATE PLANNING_ALLIANT.STG.TMP_NEW_PLANNING_CLIENT\
      \ as t\n        SET \n            GROUP_ID = :counter,\n            GROUP_NAME\
      \ =  CONCAT(:counter, '_CLIENT_PARENT'),\n            PARENT_PLANNING_ID = \
      \ CONCAT(:counter, '_CLIENT_PARENT')\n        FROM (\n            SELECT ROW_ID\
      \ \n            FROM PLANNING_ALLIANT.STG.TMP_NEW_PLANNING_CLIENT\n        \
      \    WHERE GROUP_ID IS NULL\n            LIMIT CAST(:no_rows AS INT)\n     \
      \   ) AS s\n        WHERE t.ROW_ID = s.ROW_ID;\n\n        counter := :counter\
      \ + 1;\n    END WHILE;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
