  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
        UPDATE {{ ref('PLANNING_ALLIANT', 'PLANNING_FCCS_CLIENT') }} C
        SET
            PLANNING_ALIAS = CAST(DUP.NEW_PLANNING_ALIAS AS VARCHAR(72)),
            DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
            DW_UPDATE_USER = 'sppa_planning_fccs_broker_client_update_duplicate_alias'
        FROM {{ ref('TARGET', 'V_TMPUPDATEDUPLICATEALIAS') }} DUP
        WHERE C.PLANNING_ID = DUP.PLANNING_ID
          AND DUP.DIM_TYPE = 'Client';

        UPDATE {{ ref('PLANNING_ALLIANT', 'PLANNING_FCCS_BROKER') }} B
        SET
            PLANNING_ALIAS = DUP.NEW_PLANNING_ALIAS,
            DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
            DW_UPDATE_USER = 'sppa_planning_fccs_broker_client_update_duplicate_alias'
        FROM {{ ref('TARGET', 'V_TMPUPDATEDUPLICATEALIAS') }} DUP
        WHERE B.PLANNING_ID = DUP.PLANNING_ID
          AND DUP.DIM_TYPE = 'Broker';
      END
    testsEnabled: true
    truncateBefore: false
