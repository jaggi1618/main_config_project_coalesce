    cteString: |-
      CTEDUPS AS (
        SELECT PLANNING_ALIAS, COUNT(1) AS ROW_COUNT, COUNT(DISTINCT DIM_TYPE) AS DIM_TYPE_COUNT
        FROM {{ ref('DBSHIFT', 'V_CTEPLANNIGALIAS') }}
        GROUP BY PLANNING_ALIAS
        HAVING COUNT(1) > 1
      )
    enabledColumnTestIDs: []
    sourceMapping:
      - aliases:
          V_CTEPLANNIGALIAS: A
          PLANNING_FCCS_ACTUALS: AC
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: DBSHIFT
            nodeName: V_CTEPLANNIGALIAS
          - locationName: DBSHIFT
            nodeName: PLANNING_FCCS_ACTUALS
        join:
          joinCondition: |-
            FROM {{ ref('DBSHIFT', 'V_CTEPLANNIGALIAS') }} A
            INNER JOIN CTEDUPS D ON A.PLANNING_ALIAS = D.PLANNING_ALIAS
            LEFT OUTER JOIN {{ ref('DBSHIFT', 'PLANNING_FCCS_ACTUALS') }} AC ON A.PLANNING_ID = AC.CLIENT_PLANNING_ID AND A.DIM_TYPE = 'Client'
            LEFT OUTER JOIN {{ ref('DBSHIFT', 'PLANNING_FCCS_ACTUALS') }} AB ON A.PLANNING_ID = AB.BROKER_PLANNING_ID AND A.DIM_TYPE = 'Broker'
            GROUP BY A.DIM_TYPE, A.PLANNING_ID, A.PLANNING_ALIAS, A.SOURCE_SYSTEM, A.LOOKUP_CODE, A.DW_BROKER_CLIENT_MASTER_ID, D.ROW_COUNT, D.DIM_TYPE_COUNT
        name: V_TMPDUPLICATEALIAS
        noLinkRefs: []
