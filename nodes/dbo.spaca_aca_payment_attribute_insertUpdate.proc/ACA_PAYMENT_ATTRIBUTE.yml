operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS;
      UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_PAYMENT_ATTRIBUTE AS T
      SET
          T.ACA_PAYMENT_TYPE_CODE_ID = S.ACA_PAYMENT_TYPE_CODE_ID,
          T.ACA_PAY_TO_CODE_ID = S.ACA_PAY_TO_CODE_ID,
          T.ACA_MAIL_TO_CODE_ID = S.ACA_MAIL_TO_CODE_ID,
          T.ACA_CHECK_STOCK_TYPE_ID = S.ACA_CHECK_STOCK_TYPE_ID,
          T.PAYMENT_TYPE = S.PAYMENT_TYPE,
          T.PAY_TO = S.PAY_TO,
          T.MAIL_TO = S.MAIL_TO,
          T.CHECK_STOCK_TYPE = S.CHECK_STOCK_TYPE,
          T.ACA_SOURCE_SYSTEM_ID_WINNER = S.ACA_SOURCE_SYSTEM_ID_WINNER,
          T.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          T.ACA_UPDATE_USER = 'spaca_aca_payment_attribute_insertUpdate'
      FROM {{ ref('DBSHIFT', 'ACA_PAYMENT_ATTRIBUTE_STAGING') }} AS S
      WHERE S.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID = T.SOURCE_SYSTEM_PAYMENT_ATTRIBUTE_ID
      AND T.ACA_DATE_CREATED <> CURRENT_TIMESTAMP()
      AND (IFNULL(T.ACA_PAYMENT_TYPE_CODE_ID, -1) <> IFNULL(S.ACA_PAYMENT_TYPE_CODE_ID, -1)
           OR IFNULL(T.ACA_PAY_TO_CODE_ID, -1) <> IFNULL(S.ACA_PAY_TO_CODE_ID, -1)
           OR IFNULL(T.ACA_MAIL_TO_CODE_ID, -1) <> IFNULL(S.ACA_MAIL_TO_CODE_ID, -1)
           OR IFNULL(T.ACA_CHECK_STOCK_TYPE_ID, -1) <> IFNULL(S.ACA_CHECK_STOCK_TYPE_ID, -1)
           OR IFNULL(T.PAYMENT_TYPE, '') <> IFNULL(S.PAYMENT_TYPE, '')
           OR IFNULL(T.PAY_TO, '') <> IFNULL(S.PAY_TO, '')
           OR IFNULL(T.MAIL_TO, '') <> IFNULL(S.MAIL_TO, '')
           OR IFNULL(T.CHECK_STOCK_TYPE, '') <> IFNULL(S.CHECK_STOCK_TYPE, '')
           OR IFNULL(T.ACA_SOURCE_SYSTEM_ID_WINNER, -1) <> IFNULL(S.ACA_SOURCE_SYSTEM_ID_WINNER, -1));
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: false
