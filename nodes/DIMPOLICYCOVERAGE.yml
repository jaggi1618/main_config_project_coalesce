name: DIMPOLICYCOVERAGE
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      USE DATABASE ALLIANT_DW;
      UPDATE ALLIANT_DW.DBO.DIMPOLICYCOVERAGE AS PC
      SET
        DW_ISCURRENT = 'N',
        DW_ROW_END_DATE = CURRENT_TIMESTAMP()
      WHERE PC.DW_ISCURRENT = 'Y'
      AND NOT EXISTS (
          SELECT 1 FROM {{ ref('DBSHIFT', 'TMPPOLICYCOVERAGE') }} AS S
          WHERE S.BK_POLICY_COVERAGE = PC.BK_POLICY_COVERAGE
      );
      END;
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_DW;
      UPDATE ALLIANT_DW.DBO.DIMPOLICYCOVERAGE AS PC
      SET
        PC.POLICY_TERM_SK = S.POLICY_TERM_SK,
        PC.COVERAGE_GROUP_DESCRIPTION = S.COVERAGE_GROUP_DESCRIPTION,
        PC.COVERAGE_DESCRIPTION = S.COVERAGE_DESCRIPTION,
        PC.COVERAGE_LIMIT = S.COVERAGE_LIMIT,
        PC.COVERAGE_DEDUCTIBLE = S.COVERAGE_DEDUCTIBLE,
        PC.COVERAGE_PREMIUM = S.COVERAGE_PREMIUM,
        PC.COVERAGE_ATTACHMENT_POINT = S.COVERAGE_ATTACHMENT_POINT,
        PC.COVERAGE_TYPE = S.COVERAGE_TYPE,
        PC.COVERAGE_CODE = S.COVERAGE_CODE,
        PC.COVERAGE_RETRO_DATE = S.COVERAGE_RETRO_DATE,
        PC.COVERAGE_SUB_TYPE = S.COVERAGE_SUB_TYPE,
        PC.IS_PRIMARY_COVERAGE = S.IS_PRIMARY_COVERAGE,
        PC.DW_UPDATE_DATE = CURRENT_TIMESTAMP()
      FROM {{ ref('DBSHIFT', 'TMPPOLICYCOVERAGE') }} AS S
      WHERE PC.BK_POLICY_COVERAGE = S.BK_POLICY_COVERAGE
      AND PC.DW_ISCURRENT = 'Y'
      AND (
          IFNULL(PC.POLICY_TERM_SK, -1) <> IFNULL(S.POLICY_TERM_SK, -1) OR
          IFNULL(PC.COVERAGE_GROUP_DESCRIPTION, '') <> IFNULL(S.COVERAGE_GROUP_DESCRIPTION, '') OR
          IFNULL(PC.COVERAGE_DESCRIPTION, '') <> IFNULL(S.COVERAGE_DESCRIPTION, '') OR
          IFNULL(PC.COVERAGE_LIMIT, 0) <> IFNULL(S.COVERAGE_LIMIT, 0) OR
          IFNULL(PC.COVERAGE_DEDUCTIBLE, 0) <> IFNULL(S.COVERAGE_DEDUCTIBLE, 0) OR
          IFNULL(PC.COVERAGE_PREMIUM, 0) <> IFNULL(S.COVERAGE_PREMIUM, 0) OR
          IFNULL(PC.COVERAGE_ATTACHMENT_POINT, 0) <> IFNULL(S.COVERAGE_ATTACHMENT_POINT, 0) OR
          IFNULL(PC.COVERAGE_TYPE, '') <> IFNULL(S.COVERAGE_TYPE, '') OR
          IFNULL(PC.COVERAGE_CODE, '') <> IFNULL(S.COVERAGE_CODE, '') OR
          IFNULL(PC.COVERAGE_RETRO_DATE, '1900-01-01'::DATE) <> IFNULL(S.COVERAGE_RETRO_DATE, '1900-01-01'::DATE) OR
          IFNULL(PC.COVERAGE_SUB_TYPE, '') <> IFNULL(S.COVERAGE_SUB_TYPE, '') OR
          IFNULL(PC.IS_PRIMARY_COVERAGE, FALSE) <> IFNULL(S.IS_PRIMARY_COVERAGE, FALSE)
      );
      END;
    testsEnabled: true
    truncateBefore: false
