    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE PLANNING_ALLIANT;

      UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS C
      SET
          PLANNING_ALIAS = CAST(DUP.NEW_PLANNING_ALIAS AS VARCHAR(72)),
          DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
          DW_UPDATE_USER = 'sppa_planning_fccs_broker_client_update_duplicate_alias'
      FROM {{ ref('PLANNING_ALLIANT_STAGING', 'TMPUPDATEDUPLICATEALIAS') }} AS DUP
      WHERE C.PLANNING_ID = DUP.PLANNING_ID AND DUP.DIM_TYPE = 'Client';

      UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER AS B
      SET
          PLANNING_ALIAS = DUP.NEW_PLANNING_ALIAS,
          DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
          DW_UPDATE_USER = 'sppa_planning_fccs_broker_client_update_duplicate_alias'
      FROM {{ ref('PLANNING_ALLIANT_STAGING', 'TMPUPDATEDUPLICATEALIAS') }} AS DUP
      WHERE B.PLANNING_ID = DUP.PLANNING_ID AND DUP.DIM_TYPE = 'Broker';

      END;
