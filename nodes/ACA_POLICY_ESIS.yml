  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    LET PROC_NAME VARCHAR := 'dbo.spaca_aca_policy_esis_insertUpdate';\n\
      \    LET CURRENT_TIMESTAMP_VAR TIMESTAMP_NTZ := CURRENT_TIMESTAMP();\n    LET\
      \ DEFAULTDATE DATE := CAST('1776-07-04' AS DATE);\n\n    UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY_ESIS\
      \ AS T\n    SET\n        T.ACA_DATE_ID_EXPIRATION_DATE = SOURCE.NEW_ACA_DATE_ID_EXPIRATION_DATE,\n\
      \        T.EXPIRATION_DATE = SOURCE.NEW_EXPIRATION_DATE,\n        T.ACA_DATE_UPDATED\
      \ = CURRENT_TIMESTAMP_VAR,\n        T.ACA_UPDATE_USER = PROC_NAME\n    FROM\
      \ (\n        SELECT\n            S.SOURCE_SYSTEM_POLICY_ID,\n            S.ACA_SOURCE_SYSTEM_ID,\n\
      \            CAST(TRY_TO_VARCHAR(S.EXPIRATION_DATE, 'YYYYMMDD') AS NUMBER(10,0))\
      \ AS NEW_ACA_DATE_ID_EXPIRATION_DATE,\n            S.EXPIRATION_DATE AS NEW_EXPIRATION_DATE\n\
      \        FROM {{ ref_no_link('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_POLICY_STAGING_ESIS')\
      \ }} AS S\n    ) AS SOURCE\n    WHERE\n        T.SOURCE_SYSTEM_POLICY_ID = SOURCE.SOURCE_SYSTEM_POLICY_ID\n\
      \        AND T.ACA_SOURCE_SYSTEM_ID = SOURCE.ACA_SOURCE_SYSTEM_ID\n        AND\
      \ T.ACA_DATE_CREATED <> CURRENT_TIMESTAMP_VAR\n        AND COALESCE(T.EXPIRATION_DATE,\
      \ DEFAULTDATE) <> COALESCE(SOURCE.NEW_EXPIRATION_DATE, DEFAULTDATE);\nEND;"
