    sourceMapping:
      - aliases: {}
        customSQL:
          customSQL: |-
            SELECT
                P.ACA_TRANSACTION_PAYMENT_ID,
                P.CLAIM_COVERAGE_CODE,
                U.RESERVE_TYPE_COLUMN_NUMBER,
                U.RESERVE_PAYMENT_AMOUNT
            FROM (
                SELECT
                    ACA_TRANSACTION_PAYMENT_ID,
                    CLAIM_COVERAGE_CODE AS CLAIM_COVERAGE_CODE,
                    RESERVE_AMT1 AS COL1, RESERVE_AMT2 AS COL2, RESERVE_AMT3 AS COL3,
                    RESERVE_AMT4 AS COL4, RESERVE_AMT5 AS COL5, RESERVE_AMT6 AS COL6
                FROM {{ ref('DBSHIFT', 'ACA_TRANSACTION_PAYMENT') }}
                WHERE ACA_DATE_UPDATED > (
                    SELECT COALESCE(MAX(ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ)
                    FROM {{ ref('DBSHIFT', 'ACA_PAYMENT_TRANSACTION') }}
                    WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'GB')
                )
            ) AS P
            UNPIVOT (
                RESERVE_PAYMENT_AMOUNT FOR RESERVE_TYPE_COLUMN_NUMBER IN (COL1, COL2, COL3, COL4, COL5, COL6)
            ) AS U
            WHERE U.RESERVE_PAYMENT_AMOUNT <> 0
