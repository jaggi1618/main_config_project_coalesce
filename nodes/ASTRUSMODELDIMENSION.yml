        join:
          joinCondition: |-
            FROM {{ ref('DBSHIFT', 'ACA_CLAIM') }} AS C
            LEFT JOIN {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} SS ON SS.ACA_SOURCE_SYSTEM_ID = C.ACA_SOURCE_SYSTEM_ID
            LEFT JOIN {{ ref('DBSHIFT', 'ACA_ACCOUNT_STRUCTURE') }} AS A ON A.ACA_ACCOUNT_STRUCTURE_ID = C.ACA_ACCOUNT_STRUCTURE_ID
            LEFT JOIN {{ ref('DBSHIFT', 'ACA_CLAIM_TRANSACTION') }} AS CT ON CT.ACA_CLAIM_ID = C.ACA_CLAIM_ID AND CT.ACA_CURRENT_FLAG = 'Y'
            LEFT JOIN {{ ref('DBSHIFT', 'ACA_POLICY') }} AS P ON P.ACA_POLICY_ID = CT.ACA_POLICY_ID
            LEFT JOIN {{ ref('DBSHIFT', 'ACA_COVERAGE_GROUP') }} AS CG ON CG.CLAIM_COVERAGE_CODE = C.CLAIM_COVERAGE_CODE AND CG.ACA_SOURCE_SYSTEM_ID = C.ACA_SOURCE_SYSTEM_ID
            LEFT JOIN {{ ref('DBSHIFT', 'ACA_SUMMARIZED_BODY_PART') }} SBP ON SBP.BODY_PART_CODE = CT.PART_OF_BODY_CODE AND SBP.ACA_SOURCE_SYSTEM_ID = CT.ACA_SOURCE_SYSTEM_ID
            LEFT JOIN {{ ref('DBSHIFT', 'ACA_CLAIM_ATTRIBUTE') }} AS CA ON CA.ACA_CLAIM_ATTRIBUTE_ID = CT.ACA_CLAIM_ATTRIBUTE_ID
            LEFT JOIN {{ ref('DBSHIFT', 'ACA_CLAIMANT') }} AS CM ON CM.ACA_CLAIMANT_ID = CT.ACA_CLAIMANT_ID
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELBODYPARTCODE') }} AS BP ON BP.PART_OF_BODY_CODE = CT.PART_OF_BODY_CODE
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELNATURECODE') }} AS BI ON BI.NATURE_CODE = CT.NATURE_OF_LOSS_CODE_BODILY_INJURY
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELNATURECODE') }} AS PD ON PD.NATURE_CODE = CT.NATURE_OF_LOSS_CODE_PROPERTY_DAMAGE
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELACCIDENTSOURCECODE') }} AS ACS ON ACS.ACA_ACCIDENT_SOURCE_CODE_ID = CT.ACA_ACCIDENT_SOURCE_CODE_ID
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELACCIDENTTYPECODE') }} AS ACT ON ACT.ACCIDENT_TYPE_CODE = CT.ACCIDENT_TYPE_CODE
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELNCCIACT') }} AS NCA ON NCA.NCCI_ACT_CODE = C.NCCI_ACT
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELMETHODOFSETTLEMENT') }} AS MOS ON MOS.SOURCE_SYSTEM_METHOD_OF_SETTLEMENT_CODE = (CT.SOURCE_SYSTEM || '_' || CT.BENEFIT_JURISDICTION_STATE_CODE || '_' || IFNULL(CT.METHOD_OF_SETTLEMENT_CODE, ''))
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELNCCIINJURYCODE') }} AS NCI ON NCI.SOURCE_SYSTEM_NCCI_INJURY_CODE = (CT.SOURCE_SYSTEM || '_' || CT.BENEFIT_JURISDICTION_STATE_CODE || '_' || CT.NCCI_INJURY_CODE)
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELNCCILOSSCOVERAGECODE') }} AS NCC ON NCC.SOURCE_SYSTEM_NCCI_LOSS_COVERAGE_CODE = (CT.BENEFIT_JURISDICTION_STATE_CODE || '_' || CT.NCCI_LOSS_COVERAGE_CODE)
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELNCCITYPEOFLOSSCODE') }} AS NCL ON NCL.NCCI_TYPE_OF_LOSS_CODE = CT.NCCI_TYPE_OF_LOSS_CODE
            LEFT JOIN {{ ref('DBSHIFT', 'ASTRUSMODELNCCIPPOCode') }} AS NCP ON NCP.NCCI_PPO_CODE = (CASE CT.NCCI_PPO_CODE WHEN 'N' THEN '00' WHEN 'Y' THEN '03' ELSE CT.NCCI_PPO_CODE END)
            WHERE (C.DELETED_FLAG = 'N' OR C.DELETED_FLAG IS NULL)
