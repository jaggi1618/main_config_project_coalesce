        dependencies:
          - locationName: DBSHIFT
            nodeName: V_TMP_PAYMENT_RESERVE_TYPE
        join:
          joinCondition: |-
            SELECT
             UNIQUE_CLAIM_ID
            ,IFNULL("'B. I.'",0.00) AS PMT_BI
            ,IFNULL(COLLISION,0.00) AS PMT_COLLISION
            ,IFNULL(COMP,0.00) AS PMT_COMP
            ,IFNULL(EXPENSE,0.00) AS PMT_EXPENSE
            ,IFNULL(INDEMNITY,0.00) AS PMT_INDEMNITY
            ,IFNULL(MEDICAL,0.00) AS PMT_MEDICAL
            ,IFNULL("'P. D.'",0.00) AS PMT_PD
            ,IFNULL(REHAB,0.00) AS PMT_REHAB
            FROM {{ ref('DBSHIFT', 'V_TMP_PAYMENT_RESERVE_TYPE') }} T1
            PIVOT (SUM(PAYMENT_AMOUNT)
            FOR RESERVE_TYPE IN ('B. I.','BUILDING','COLLISION','COMP','CONTENTS','EXPENSE','EXTD. COVG.','INDEMNITY','LOSS','MEDICAL','P. D.','REHAB','V & M.M.','WAGE LOSS','Zero (0)'))
            GROUP BY UNIQUE_CLAIM_ID
