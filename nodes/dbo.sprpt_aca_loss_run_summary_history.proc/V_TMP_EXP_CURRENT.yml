                SELECT
                ACA_TRANSACTION_EXPERIENCE_ID 
                ,UNIQUE_CLAIM_ID
                ,CLAIM_COVERAGE_CODE
                ,EXPERIENCE_AMOUNT1
                ,EXPERIENCE_AMOUNT2
