                ,ROW_NUMBER() OVER (PARTITION BY UNIQUE_CLAIM_ID ORDER BY EXPERIENCE_TRANSACTION_DATE DESC, TRANSACTION_SEQUENCE_NUMBER ASC) AS ROW_NUM
                FROM {{ ref('DBSHIFT', 'ACA_TRANSACTION_EXPERIENCE') }}
                WHERE EXPERIENCE_TRANSACTION_DATE <= CURRENT_DATE()
            )
            SELECT * FROM CTEEXPERIENCE WHERE ROW_NUM = 1
