        join:
          joinCondition: |-
            SELECT 
            TP.UNIQUE_CLAIM_ID
            ,TP.CLAIM_COVERAGE_CODE
            ,ACC.CLASS
            ,SUM(TP.RESERVE_AMT1) AS RESERVE_AMT1
            ,SUM(TP.RESERVE_AMT2) AS RESERVE_AMT2
            ,SUM(TP.RESERVE_AMT3) AS RESERVE_AMT3
            ,SUM(TP.RESERVE_AMT4) AS RESERVE_AMT4
            ,SUM(TP.RESERVE_AMT5) AS RESERVE_AMT5
            ,SUM(TP.RESERVE_AMT6) AS RESERVE_AMT6
            FROM {{ ref('DBSHIFT', 'ACA_TRANSACTION_PAYMENT') }} TP
            LEFT OUTER JOIN {{ ref('DBSHIFT', 'ACA_COVERAGE_CODE') }} ACC ON TP.CLAIM_COVERAGE_CODE = ACC.CODE
            WHERE TP.PAYMENT_TRANSACTION_DATE <= CURRENT_DATE()
            GROUP BY 
            TP.UNIQUE_CLAIM_ID
            ,TP.CLAIM_COVERAGE_CODE
            ,ACC.CLASS
