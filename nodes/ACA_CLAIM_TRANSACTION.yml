    postSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
      UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM_TRANSACTION AS d
      SET d.aca_policy_id = s.aca_policy_id,
          d.aca_claim_id = s.aca_claim_id,
          d.aca_claimant_id = s.aca_claimant_id,
          d.aca_claim_attribute_id = s.aca_claim_attribute_id,
