          - locationName: ALLIANT_CLAIM_ASTRUS_STAGE
            nodeName: ACA_TRANSACTION_CLAIM
          - locationName: DBSHIFT
            nodeName: ACA_SOURCE_SYSTEM
          - locationName: TARGET
            nodeName: VW_TMP_ACA_TRANSACTION_CLAIM
        join:
          joinCondition: |-
            FROM {{ ref('ALLIANT_CLAIM_ASTRUS_STAGE', 'ACA_TRANSACTION_CLAIM') }} AS ct
            INNER JOIN {{ ref('ALLIANT_CLAIM_ASTRUS_STAGE', 'ACA_SOURCE_SYSTEM') }} AS ss
              ON ct.ACA_SOURCE_SYSTEM_ID = ss.ACA_SOURCE_SYSTEM_ID
              AND ss.SOURCE_SYSTEM = 'GB'
            INNER JOIN (
              SELECT DISTINCT unique_claim_id AS UNIQUE_CLAIM_ID
              FROM {{ ref('TARGET', 'VW_TMP_ACA_TRANSACTION_CLAIM') }}
            ) AS t 
              ON ct.SOURCE_SYSTEM_CLAIM_ID = t.UNIQUE_CLAIM_ID
            INNER JOIN (
              SELECT source_system_claim_id AS SOURCE_SYSTEM_CLAIM_ID, 
                     MAX(aca_transaction_date) AS ACA_TRANSACTION_DATE
              FROM {{ ref('ALLIANT_CLAIM_ASTRUS', 'ACA_CLAIM_TRANSACTION') }}
              WHERE aca_source_system_id = (
                SELECT ACA_SOURCE_SYSTEM_ID 
                FROM {{ ref('ALLIANT_CLAIM_ASTRUS_STAGE', 'ACA_SOURCE_SYSTEM') }} 
                WHERE SOURCE_SYSTEM = 'GB'
              )
              GROUP BY source_system_claim_id
            ) AS act 
              ON act.SOURCE_SYSTEM_CLAIM_ID = ct.SOURCE_SYSTEM_CLAIM_ID 
              AND act.ACA_TRANSACTION_DATE = ct.ACA_TRANSACTION_DATE
