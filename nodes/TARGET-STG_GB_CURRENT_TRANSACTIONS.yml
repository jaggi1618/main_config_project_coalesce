    cteString: |-
      WITH distinct_claims AS (
          SELECT DISTINCT
              UNIQUE_CLAIM_ID
          FROM {{ ref('DBSHIFT', 'VW_TMP_ACA_TRANSACTION_CLAIM') }}
      ),
      max_dates AS (
          SELECT
              SOURCE_SYSTEM_CLAIM_ID,
              MAX(ACA_TRANSACTION_DATE) AS ACA_TRANSACTION_DATE
          FROM {{ ref('DBSHIFT', 'ACA_TRANSACTION_CLAIM') }}
          WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'GB')
          GROUP BY SOURCE_SYSTEM_CLAIM_ID
      )
